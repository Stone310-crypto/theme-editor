<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Theme Editor v2</title>
<style>
:root{--bg:#0f1117;--panel:#1a1c26;--border:rgba(255,255,255,0.08);--text:#e8e4df;--text2:#b8b4ae;--muted:#6e6b65;--acc:#d4a853;--acc-bg:rgba(212,168,83,0.1);--green:#5a9e6f;--red:#d95b5b;--input-bg:#2f3342;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:12px;line-height:1.4;overflow:hidden;height:100vh;display:flex;flex-direction:column}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.toolbar h1{font-size:15px;font-weight:700;margin-right:12px}
.btn{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap}
.btn-primary{background:var(--acc);color:#000}.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--border);color:var(--text)}.btn-green{background:var(--green);color:#fff}
.btn-tab{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:11px}
.btn-tab.active{background:var(--acc);color:#000;border-color:var(--acc)}
.main{display:flex;flex:1;overflow:hidden}
.left{width:420px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:8px}
.right{flex:1;overflow:hidden;display:flex;flex-direction:column}
.preview-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);flex-shrink:0}
.preview-container{flex:1;overflow:hidden;position:relative}
.comp-tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.comp-tabs .btn-tab{font-size:10px;padding:3px 8px}
.css-editor{width:100%;min-height:120px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--text);resize:vertical;outline:none;tab-size:2}
.vars-scroll{max-height:450px;overflow-y:auto}
.var-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.var-label{width:140px;font-size:10px;color:var(--text2);font-family:monospace;flex-shrink:0}
.var-input{flex:1;padding:3px 6px;border-radius:3px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:11px;font-family:monospace;outline:none}
.var-input:focus{border-color:var(--acc)}
.var-color{width:22px;height:22px;border-radius:3px;border:1px solid var(--border);cursor:pointer;padding:0;flex-shrink:0}
.var-swatch{width:14px;height:14px;border-radius:2px;border:1px solid var(--border);flex-shrink:0}
.preview-dash{padding:12px;background:var(--preview-bg,#0f1117);color:var(--preview-text,#e8e4df);font-family:-apple-system,BlinkMacSystemFont,sans-serif;height:100%;overflow:auto}
.preview-dash .nav{display:flex;gap:8px;padding:8px;background:var(--preview-panel,#1a1c26);border-radius:8px;margin-bottom:8px}
.preview-dash .nav-item{padding:4px 10px;border-radius:4px;font-size:11px;color:var(--preview-text2,#b8b4ae)}
.preview-dash .nav-item.active{background:var(--preview-accent,#d4a853);color:#000}
.preview-dash .card{background:var(--preview-panel,#1a1c26);border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid var(--preview-border,rgba(255,255,255,0.08))}
.preview-dash .card h3{font-size:12px;color:var(--preview-text2,#b8b4ae);margin-bottom:4px}
.preview-dash .card .val{font-size:20px;font-weight:700}
.preview-dash .wallet-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--preview-border,rgba(255,255,255,0.05))}
.preview-dash .btn-preview{padding:6px 12px;border-radius:6px;background:var(--preview-accent,#d4a853);color:#000;border:none;font-size:11px;font-weight:600}
.preview-dash .input-preview{padding:6px 10px;border-radius:6px;background:var(--preview-input,#2f3342);border:1px solid var(--preview-border,rgba(255,255,255,0.08));color:var(--preview-text,#e8e4df);font-size:11px}
.status{font-size:10px;color:var(--muted)}.status.changed{color:var(--acc);font-weight:600}
</style>
</head>
<body>
<div class="toolbar"><h1>🎨 Theme Editor</h1><span style="flex:1"></span><button class="btn btn-secondary" onclick="resetAll()">🔄 Reset</button><button class="btn btn-green" onclick="applyTheme()">✅ Übernehmen</button><button class="btn btn-primary" onclick="saveTheme()">💾 Speichern</button><span id="changed-count" class="status">Keine Änderungen</span></div>
<div class="main">
<div class="left"><div class="comp-tabs" id="comp-tabs"></div><div id="panel-global"><div class="vars-scroll" id="vars-container"></div></div><div id="panel-component" style="display:none"><div style="margin-bottom:6px;font-size:11px;color:var(--text2)">CSS für <strong id="comp-name">—</strong></div><textarea class="css-editor" id="comp-css" placeholder="/* Custom CSS */" oninput="updateCompCSS()"></textarea><div style="margin-top:8px;font-size:10px;color:var(--muted)">Klassen: <code>.card</code> <code>.btn-preview</code> <code>.nav</code> <code>.wallet-row</code></div><div style="margin-top:4px"><label style="font-size:10px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="layout-grid" onchange="updatePreview()"> Grid-Layout</label></div></div><details style="margin-top:8px"><summary style="font-size:11px;color:var(--text2);cursor:pointer">📝 Generiertes CSS</summary><textarea class="css-editor" id="css-output" readonly style="margin-top:4px;min-height:120px"></textarea></details></div>
<div class="right"><div class="preview-bar"><span>👁️ Live-Vorschau</span><span style="flex:1"></span><span style="font-size:10px;color:var(--muted)" id="preview-mode">Global</span></div><div class="preview-container"><div class="preview-dash" id="preview"></div></div></div>
</div>
<script>
let _id=0;const _p={};window.addEventListener('message',e=>{if(e.data?.id&&_p[e.data.id]){if(e.data.ok)_p[e.data.id].resolve(e.data.result);else _p[e.data.id].reject(new Error(e.data.error));delete _p[e.data.id]}});function invoke(cmd,args){return new Promise((r,j)=>{const id=++_id;_p[id]={resolve:r,reject:j};window.parent.postMessage({type:'tauri-invoke',id,cmd,args},'*')})}
const COMPONENTS=[{id:'global',name:'🌐 Global',css:''},{id:'wallet',name:'💰 Wallet',css:''},{id:'chat',name:'💬 Chat',css:''},{id:'settings',name:'⚙️ Einstellungen',css:''},{id:'navbar',name:'🧭 NavBar',css:''},{id:'explorer',name:'🔍 Explorer',css:''},{id:'profile',name:'👤 Profil',css:''}];
let activeComp='global',changedVars={};
const VARS=[{section:'Hintergründe',vars:[{name:'--bg-root',def:'#0f1117',desc:'Root',color:1},{name:'--bg-panel',def:'#1a1c26',desc:'Panel',color:1},{name:'--bg-main',def:'#1e202a',desc:'Main',color:1},{name:'--bg-input',def:'#2f3342',desc:'Input',color:1}]},{section:'Akzent',vars:[{name:'--accent',def:'#d4a853',desc:'Primär',color:1},{name:'--accent-hover',def:'#e0b864',desc:'Hover',color:1}]},{section:'Farben',vars:[{name:'--green',def:'#5a9e6f',desc:'Erfolg',color:1},{name:'--red',def:'#d95b5b',desc:'Fehler',color:1},{name:'--blue',def:'#6b9cc4',desc:'Info',color:1}]},{section:'Text',vars:[{name:'--text-primary',def:'#e8e4df',desc:'Primär',color:1},{name:'--text-secondary',def:'#b8b4ae',desc:'Sekundär',color:1},{name:'--text-muted',def:'#6e6b65',desc:'Gedimmt',color:1},{name:'--text-inverse',def:'#0f1117',desc:'Invers',color:1}]},{section:'Rahmen',vars:[{name:'--border-default',def:'rgba(255,255,255,0.08)',desc:'Default',color:1},{name:'--border-strong',def:'rgba(255,255,255,0.12)',desc:'Strong',color:1}]}];
function buildCompTabs(){document.getElementById('comp-tabs').innerHTML=COMPONENTS.map(c=>`<button class="btn-tab${c.id===activeComp?' active':''}" onclick="switchComp('${c.id}')">${c.name}</button>`).join('')}
function switchComp(id){activeComp=id;buildCompTabs();document.getElementById('panel-global').style.display=id==='global'?'block':'none';document.getElementById('panel-component').style.display=id==='global'?'none':'block';if(id!=='global'){document.getElementById('comp-name').textContent=COMPONENTS.find(c=>c.id===id).name;document.getElementById('comp-css').value=COMPONENTS.find(c=>c.id===id).css;document.getElementById('preview-mode').textContent=COMPONENTS.find(c=>c.id===id).name}else{document.getElementById('preview-mode').textContent='Global'}updatePreview()}
function buildVars(){let h='';VARS.forEach(s=>{h+=`<div style="font-size:11px;font-weight:600;color:var(--text2);margin:8px 0 4px">${s.section}</div>`;s.vars.forEach(v=>{const val=changedVars[v.name]!==undefined?changedVars[v.name]:v.def;h+=`<div class="var-row"><span class="var-label">${v.name}</span>${v.color?`<div class="var-swatch" style="background:${val}"></div>`:''}${v.color?`<input type="color" class="var-color" value="${toHex(val)}" onchange="updateVar('${v.name}',this.value)">`:''}<input type="text" class="var-input" value="${val}" onchange="updateVar('${v.name}',this.value)" oninput="updateVarLive('${v.name}',this.value)"><span style="font-size:10px;color:var(--muted);width:50px">${v.desc}</span></div>`})});document.getElementById('vars-container').innerHTML=h}
function toHex(c){if(c.startsWith('#'))return c;const ctx=document.createElement('canvas').getContext('2d');if(!ctx)return'#000';ctx.fillStyle=c;return ctx.fillStyle}
function findDef(n){for(const s of VARS)for(const v of s.vars)if(v.name===n)return v.def;return''}
function updateVar(name,val){if(val===findDef(name)){delete changedVars[name];document.documentElement.style.removeProperty(name)}else{changedVars[name]=val;document.documentElement.style.setProperty(name,val)}updateStatus();updatePreview();updateCSSOutput()}
function updateVarLive(name,val){document.documentElement.style.setProperty(name,val||findDef(name));updatePreview()}
function updateStatus(){const c=Object.keys(changedVars).length+COMPONENTS.filter(x=>x.css).length;const el=document.getElementById('changed-count');el.textContent=c?`${c} Änderungen`:'Keine Änderungen';el.className=c?'status changed':'status'}
function updateCompCSS(){const comp=COMPONENTS.find(c=>c.id===activeComp);if(comp)comp.css=document.getElementById('comp-css').value;updateStatus();updatePreview();updateCSSOutput()}
function updateCSSOutput(){let lines=[':root {'];for(const s of VARS){lines.push(`  /* ${s.section} */`);for(const v of s.vars)lines.push(`  ${v.name}: ${changedVars[v.name]!==undefined?changedVars[v.name]:v.def};`)}lines.push('}');for(const c of COMPONENTS){if(c.css){lines.push('');lines.push(`/* ${c.name} */`);lines.push(c.css)}}document.getElementById('css-output').value=lines.join('\n')}
function updatePreview(){const p=document.getElementById('preview');const get=(v,d)=>changedVars[v]!==undefined?changedVars[v]:d;const bg=get('--bg-root','#0f1117'),panel=get('--bg-panel','#1a1c26'),border=get('--border-default','rgba(255,255,255,0.08)'),text=get('--text-primary','#e8e4df'),text2=get('--text-secondary','#b8b4ae'),acc=get('--accent','#d4a853'),input=get('--bg-input','#2f3342'),green=get('--green','#5a9e6f'),red=get('--red','#d95b5b');p.style.cssText=`--preview-bg:${bg};--preview-panel:${panel};--preview-border:${border};--preview-text:${text};--preview-text2:${text2};--preview-accent:${acc};--preview-input:${input}`;let html='';if(activeComp==='global'){html+=`<div class="nav">${['💬 Chat','💰 Wallet','🔍 Explorer','⚙️ Settings'].map(x=>`<span class="nav-item${x==='💰 Wallet'?' active':''}">${x}</span>`).join('')}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="card"><h3>💰 Balance</h3><div class="val">1.234 STONE</div></div><div class="card"><h3>🔗 Block</h3><div class="val">#42</div></div></div><div class="card"><h3>Letzte TXs</h3><div class="wallet-row"><span>TX abc...</span><span style="color:${green}">+50</span></div><div class="wallet-row"><span>TX def...</span><span style="color:${red}">-10</span></div></div><div style="display:flex;gap:8px;margin-top:8px"><input class="input-preview" placeholder="Empfänger..." style="flex:1"><button class="btn-preview">Senden</button></div>'}else if(activeComp==='wallet'){html+=`<h3 style="margin-bottom:8px">💰 Wallet</h3><div class="card"><h3>Balance</h3><div class="val">1.234 STONE</div></div><div class="card"><h3>TXs</h3><div class="wallet-row"><span>TX abc...</span><span style="color:${green}">+50</span></div><div class="wallet-row"><span>TX def...</span><span style="color:${red}">-10</span></div></div><div style="display:flex;gap:8px"><input class="input-preview" placeholder="Wallet" style="flex:1"><button class="btn-preview">Senden</button></div>`}else if(activeComp==='chat'){html+=`<h3 style="margin-bottom:8px">💬 Chat</h3><div style="background:${panel};border-radius:8px;padding:8px;margin-bottom:4px"><span style="color:${acc}">User1:</span> Hey!</div><div style="background:${panel};border-radius:8px;padding:8px;margin-bottom:4px"><span style="color:${acc}">User2:</span> Alles gut! 🚀</div><div style="display:flex;gap:8px;margin-top:8px"><input class="input-preview" placeholder="Nachricht..." style="flex:1"><button class="btn-preview">Senden</button></div>`}else if(activeComp==='settings'){html+=`<h3 style="margin-bottom:8px">⚙️ Einstellungen</h3><div class="card"><div class="wallet-row"><span>Auto-Mining</span><span style="color:${green}">An</span></div><div class="wallet-row"><span>Storage</span><span>100 GB</span></div><div class="wallet-row"><span>Benachrichtigungen</span><span style="color:${green}">An</span></div></div>`}else if(activeComp==='navbar'){html+=`<div class="nav">${['🏠 Start','💬 Chat','💰 Wallet','🔍 Explorer'].map(x=>`<span class="nav-item${x==='💰 Wallet'?' active':''}">${x}</span>`).join('')}</div><div style="margin-top:12px;color:var(--text2);font-size:11px">NavBar Breite: --rail-w</div>`}else if(activeComp==='explorer'){html+=`<h3 style="margin-bottom:8px">🔍 Explorer</h3><div class="card"><div class="wallet-row"><span>Block #42</span><span>12 TXs</span></div><div class="wallet-row"><span>Block #41</span><span>8 TXs</span></div></div>`}else if(activeComp==='profile'){html+=`<h3 style="margin-bottom:8px">👤 Profil</h3><div class="card"><div style="display:flex;align-items:center;gap:10px"><div style="width:40px;height:40px;border-radius:50%;background:${acc};display:flex;align-items:center;justify-content:center;color:#000;font-weight:700">U</div><div><div style="font-weight:600">Username</div><div style="font-size:11px;color:var(--text2)">wallet: abc...</div></div></div></div>`}p.innerHTML=html;const comp=COMPONENTS.find(c=>c.id===activeComp);let style='';if(comp&&comp.css)style+=comp.css;if(document.getElementById('layout-grid')?.checked)style+=`.preview-dash .wallet-row{display:grid!important;grid-template-columns:1fr 1fr;gap:4px}`;let sel=p.querySelector('#comp-style');if(!sel){sel=document.createElement('style');sel.id='comp-style';p.appendChild(sel)}sel.textContent=style}
function resetAll(){changedVars={};COMPONENTS.forEach(c=>c.css='');buildVars();switchComp('global');document.getElementById('css-output').value='';document.getElementById('preview').innerHTML='';updateStatus()}
async function applyTheme(){try{const css=document.getElementById('css-output').value;await invoke('write_theme_css',{extensionId:'theme-editor',css});let s=document.getElementById('stone-theme-css');if(!s){s=document.createElement('style');s.id='stone-theme-css';document.head.appendChild(s)}s.textContent=css;localStorage.setItem('stone-theme','theme-editor');alert('Theme übernommen!')}catch(e){alert('Fehler: '+e)}}
async function saveTheme(){const name=prompt('Theme-Name:','Mein-Theme');if(!name)return;try{const css=document.getElementById('css-output').value;const path=await invoke('save_theme_file',{name,css});alert(`Gespeichert: ${path}`)}catch(e){const b=new Blob([document.getElementById('css-output').value],{type:'text/css'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`${name}.css`;a.click()}}
buildCompTabs();buildVars();switchComp('global');updateCSSOutput();
</script>
</body>
</html>
