<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Theme Editor v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f1117;color:#e8e4df;font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1a1c26;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.toolbar h1{font-size:15px;font-weight:700;margin-right:8px}
.btn{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:#d4a853;color:#000}.btn-primary:hover{opacity:.9}
.btn-secondary{background:rgba(255,255,255,0.08);color:#e8e4df}
.btn-green{background:#5a9e6f;color:#fff}
.main{display:flex;flex:1;overflow:hidden}
.left{width:400px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.08);overflow-y:auto;padding:8px;background:#0f1117}
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.preview-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#1a1c26;border-bottom:1px solid rgba(255,255,255,0.08);font-size:11px;color:#b8b4ae;flex-shrink:0}
.preview-container{flex:1;overflow:hidden}
.comp-tabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.btn-tab{padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#b8b4ae;cursor:pointer;font-size:10px;font-weight:500}
.btn-tab.active,.btn-tab:hover{background:#d4a853;color:#000;border-color:#d4a853}
.css-editor{width:100%;min-height:100px;background:#2f3342;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:10px;font-family:monospace;font-size:11px;color:#e8e4df;resize:vertical;outline:none}
.vars-scroll{max-height:420px;overflow-y:auto}
.var-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.var-label{width:130px;font-size:10px;color:#b8b4ae;font-family:monospace;flex-shrink:0}
.var-input{flex:1;padding:3px 6px;border-radius:3px;background:#2f3342;border:1px solid rgba(255,255,255,0.08);color:#e8e4df;font-size:11px;font-family:monospace;outline:none}
.var-input:focus{border-color:#d4a853}
.var-color{width:22px;height:22px;border-radius:3px;border:1px solid rgba(255,255,255,0.12);cursor:pointer;padding:0;flex-shrink:0}
.var-swatch{width:14px;height:14px;border-radius:2px;border:1px solid rgba(255,255,255,0.12);flex-shrink:0}
.var-color::-webkit-color-swatch-wrapper{padding:0}.var-color::-webkit-color-swatch{border:none;border-radius:2px}
.preview-dash{padding:12px;height:100%;overflow:auto;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.preview-dash .nav{display:flex;gap:8px;padding:8px;border-radius:8px;margin-bottom:8px}
.preview-dash .nav-item{padding:4px 10px;border-radius:4px;font-size:11px}
.preview-dash .nav-item.active{background:#d4a853;color:#000}
.preview-dash .card{border-radius:8px;padding:12px;margin-bottom:8px}
.preview-dash .card h3{font-size:12px;margin-bottom:4px}
.preview-dash .card .val{font-size:20px;font-weight:700}
.preview-dash .wallet-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.preview-dash .btn-preview{padding:6px 12px;border-radius:6px;color:#000;border:none;font-size:11px;font-weight:600}
.preview-dash .input-preview{padding:6px 10px;border-radius:6px;font-size:11px}
.status{font-size:10px;color:#6e6b65}.status.changed{color:#d4a853;font-weight:600}
.gr-hd{font-size:11px;font-weight:600;color:#b8b4ae;margin:10px 0 4px}
</style></head><body>
<div class="toolbar"><h1>🎨 Theme Editor</h1><span style="flex:1"></span><button class="btn btn-secondary" onclick="resetAll()">🔄 Reset</button><button class="btn btn-green" onclick="applyTheme()">✅ Übernehmen</button><button class="btn btn-primary" onclick="saveTheme()">💾 Speichern</button><span id="changed-count" class="status">Keine Änderungen</span></div>
<div class="main">
<div class="left">
  <div style="font-size:10px;color:#6e6b65;margin-bottom:6px">Komponente wählen:</div>
  <div class="comp-tabs" id="comp-tabs"></div>
  <div id="panel-global"><div class="vars-scroll" id="vars-container"></div></div>
  <div id="panel-component" style="display:none">
    <div style="margin-bottom:6px;font-size:11px;color:#b8b4ae">CSS für <strong id="comp-name">—</strong></div>
    <textarea class="css-editor" id="comp-css" placeholder="/* Custom CSS für diese Komponente */" oninput="updateCompCSS()"></textarea>
    <div style="margin-top:6px;font-size:10px;color:#6e6b65">Klassen: <code style="color:#d4a853">.card</code> <code style="color:#d4a853">.btn-preview</code> <code style="color:#d4a853">.nav</code> <code style="color:#d4a853">.wallet-row</code></div>
    <div style="margin-top:6px"><label style="font-size:10px;color:#b8b4ae;display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="layout-grid" onchange="updatePreview()"> Grid-Layout</label></div>
  </div>
  <details style="margin-top:10px"><summary style="font-size:11px;color:#b8b4ae;cursor:pointer">📝 Generiertes CSS</summary><textarea class="css-editor" id="css-output" readonly style="margin-top:4px;min-height:100px"></textarea></details>
</div>
<div class="right">
  <div class="preview-bar"><span>👁️ Live-Vorschau</span><span style="flex:1"></span><span style="font-size:10px;color:#6e6b65" id="preview-mode">Global</span></div>
  <div class="preview-container"><div class="preview-dash" id="preview"></div></div>
</div></div>
<script>
let _id=0;const _p={};window.addEventListener('message',e=>{if(e.data?.id&&_p[e.data.id]){if(e.data.ok)_p[e.data.id].resolve(e.data.result);else _p[e.data.id].reject(new Error(e.data.error));delete _p[e.data.id]}});function invoke(cmd,args){return new Promise((r,j)=>{const id=++_id;_p[id]={resolve:r,reject:j};window.parent.postMessage({type:'tauri-invoke',id,cmd,args},'*')})}
const COMPS=[{id:'global',name:'🌐 Global',css:''},{id:'wallet',name:'💰 Wallet',css:''},{id:'chat',name:'💬 Chat',css:''},{id:'settings',name:'⚙️ Settings',css:''},{id:'navbar',name:'🧭 NavBar',css:''},{id:'explorer',name:'🔍 Explorer',css:''},{id:'profile',name:'👤 Profil',css:''}];
let active='global',cv={};
const VARS=[{s:'Hintergründe',v:[{n:'--bg-root',d:'#0f1117',l:'Root'},{n:'--bg-panel',d:'#1a1c26',l:'Panel'},{n:'--bg-main',d:'#1e202a',l:'Main'},{n:'--bg-input',d:'#2f3342',l:'Input'}]},{s:'Akzent',v:[{n:'--accent',d:'#d4a853',l:'Primär'},{n:'--accent-hover',d:'#e0b864',l:'Hover'}]},{s:'Farben',v:[{n:'--green',d:'#5a9e6f',l:'Erfolg'},{n:'--red',d:'#d95b5b',l:'Fehler'},{n:'--blue',d:'#6b9cc4',l:'Info'}]},{s:'Text',v:[{n:'--text-primary',d:'#e8e4df',l:'Primär'},{n:'--text-secondary',d:'#b8b4ae',l:'Sekundär'},{n:'--text-muted',d:'#6e6b65',l:'Gedimmt'}]},{s:'Rahmen',v:[{n:'--border-default',d:'rgba(255,255,255,0.08)',l:'Default'},{n:'--border-strong',d:'rgba(255,255,255,0.12)',l:'Strong'}]}];
function bt(){document.getElementById('comp-tabs').innerHTML=COMPS.map(c=>`<button class="btn-tab${c.id===active?' active':''}" onclick="sc('${c.id}')">${c.name}</button>`).join('')}
function sc(id){active=id;bt();document.getElementById('panel-global').style.display=id==='global'?'block':'none';document.getElementById('panel-component').style.display=id==='global'?'none':'block';if(id!=='global'){var c=COMPS.find(x=>x.id===id);document.getElementById('comp-name').textContent=c.name;document.getElementById('comp-css').value=c.css;document.getElementById('preview-mode').textContent=c.name}else{document.getElementById('preview-mode').textContent='Global'}up()}
function bv(){let h='';VARS.forEach(s=>{h+=`<div class="gr-hd">${s.s}</div>`;s.v.forEach(v=>{let val=cv[v.n]!==undefined?cv[v.n]:v.d;h+=`<div class="var-row"><span class="var-label">${v.n}</span><div class="var-swatch" style="background:${val}"></div><input type="color" class="var-color" value="${th(val)}" onchange="uv('${v.n}',this.value)"><input type="text" class="var-input" value="${val}" onchange="uv('${v.n}',this.value)" oninput="uvl('${v.n}',this.value)"><span style="font-size:10px;color:#6e6b65;width:50px">${v.l}</span></div>`})});document.getElementById('vars-container').innerHTML=h}
function th(c){if(c.startsWith('#'))return c;var x=document.createElement('canvas').getContext('2d');if(!x)return'#000';x.fillStyle=c;return x.fillStyle}
function fd(n){for(var s of VARS)for(var v of s.v)if(v.n===n)return v.d;return''}
function uv(n,val){if(val===fd(n)){delete cv[n]}else{cv[n]=val}us();up();uco()}
function uvl(n,val){us();up()}
function us(){var c=Object.keys(cv).length+COMPS.filter(x=>x.css).length;var el=document.getElementById('changed-count');el.textContent=c?c+' Änderungen':'Keine Änderungen';el.className=c?'status changed':'status'}
function ucc(){var c=COMPS.find(x=>x.id===active);if(c)c.css=document.getElementById('comp-css').value;us();up();uco()}
function uco(){var l=[':root {'];for(var s of VARS){l.push('  /* '+s.s+' */');for(var v of s.v)l.push('  '+v.n+': '+(cv[v.n]!==undefined?cv[v.n]:v.d)+';')}l.push('}');for(var c of COMPS){if(c.css){l.push('');l.push('/* '+c.name+' */');l.push(c.css)}}document.getElementById('css-output').value=l.join('\n')}
function up(){var p=document.getElementById('preview');var g=function(v,d){return cv[v]!==undefined?cv[v]:d};var bg=g('--bg-root','#0f1117'),pn=g('--bg-panel','#1a1c26'),bd=g('--border-default','rgba(255,255,255,0.08)'),tx=g('--text-primary','#e8e4df'),t2=g('--text-secondary','#b8b4ae'),ac=g('--accent','#d4a853'),ip=g('--bg-input','#2f3342'),gr=g('--green','#5a9e6f'),rd=g('--red','#d95b5b');p.style.cssText='background:'+bg+';color:'+tx;var s='';if(active==='global'){s='<div class="nav" style="background:'+pn+'"><span class="nav-item" style="color:'+t2+'">💬 Chat</span><span class="nav-item active">💰 Wallet</span><span class="nav-item" style="color:'+t2+'">🔍 Explorer</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="card" style="background:'+pn+';border:1px solid '+bd+'"><h3 style="color:'+t2+'">💰 Balance</h3><div class="val">1.234 STONE</div></div><div class="card" style="background:'+pn+';border:1px solid '+bd+'"><h3 style="color:'+t2+'">🔗 Block</h3><div class="val">#42</div></div></div><div class="card" style="background:'+pn+';border:1px solid '+bd+'"><h3 style="color:'+t2+'">Letzte TXs</h3><div class="wallet-row"><span>TX abc...</span><span style="color:'+gr+'">+50</span></div><div class="wallet-row"><span>TX def...</span><span style="color:'+rd+'">-10</span></div></div><div style="display:flex;gap:8px;margin-top:8px"><input class="input-preview" style="background:'+ip+';border:1px solid '+bd+';color:'+tx+';flex:1" placeholder="Empfänger..."><button class="btn-preview" style="background:'+ac+'">Senden</button></div>'}else if(active==='wallet'){s='<h3 style="margin-bottom:8px">💰 Wallet</h3><div class="card" style="background:'+pn+';border:1px solid '+bd+'"><h3 style="color:'+t2+'">Balance</h3><div class="val">1.234 STONE</div></div><div class="card" style="background:'+pn+';border:1px solid '+bd+'"><h3 style="color:'+t2+'">TXs</h3><div class="wallet-row"><span>TX abc...</span><span style="color:'+gr+'">+50</span></div><div class="wallet-row"><span>TX def...</span><span style="color:'+rd+'">-10</span></div></div><div style="display:flex;gap:8px"><input class="input-preview" style="background:'+ip+';border:1px solid '+bd+';color:'+tx+';flex:1" placeholder="Wallet"><button class="btn-preview" style="background:'+ac+'">Senden</button></div>'}else if(active==='chat'){s='<h3 style="margin-bottom:8px">💬 Chat</h3><div style="background:'+pn+';border-radius:8px;padding:8px;margin-bottom:4px"><span style="color:'+ac+'">User1:</span> Hey!</div><div style="background:'+pn+';border-radius:8px;padding:8px;margin-bottom:4px"><span style="color:'+ac+'">User2:</span> Alles gut!</div><div style="display:flex;gap:8px;margin-top:8px"><input class="input-preview" style="background:'+ip+';border:1px solid '+bd+';color:'+tx+';flex:1" placeholder="Nachricht..."><button class="btn-preview" style="background:'+ac+'">Senden</button></div>'}else if(active==='settings'){s='<h3 style="margin-bottom:8px">⚙️ Settings</h3><div class="card" style="background:'+pn+';border:1px solid '+bd+'"><div class="wallet-row"><span>Auto-Mining</span><span style="color:'+gr+'">An</span></div><div class="wallet-row"><span>Storage</span><span>100 GB</span></div><div class="wallet-row"><span>Notifications</span><span style="color:'+gr+'">An</span></div></div>'}else if(active==='navbar'){s='<div class="nav" style="background:'+pn+'">'+['🏠 Start','💬 Chat','💰 Wallet','🔍 Explorer'].map(function(x){return'<span class="nav-item'+(x==='💰 Wallet'?' active':'')+'" style="color:'+(x==='💰 Wallet'?'#000':t2)+'">'+x+'</span>'}).join('')+'</div><div style="margin-top:12px;color:'+t2+';font-size:11px">NavBar Breite: --rail-w</div>'}else if(active==='explorer'){s='<h3 style="margin-bottom:8px">🔍 Explorer</h3><div class="card" style="background:'+pn+';border:1px solid '+bd+'"><div class="wallet-row"><span>Block #42</span><span>12 TXs</span></div><div class="wallet-row"><span>Block #41</span><span>8 TXs</span></div></div>'}else if(active==='profile'){s='<h3 style="margin-bottom:8px">👤 Profil</h3><div class="card" style="background:'+pn+';border:1px solid '+bd+'"><div style="display:flex;align-items:center;gap:10px"><div style="width:40px;height:40px;border-radius:50%;background:'+ac+';display:flex;align-items:center;justify-content:center;color:#000;font-weight:700">U</div><div><div style="font-weight:600">Username</div><div style="font-size:11px;color:'+t2+'">wallet: abc...</div></div></div></div>'}p.innerHTML=s;var comp=COMPS.find(function(c){return c.id===active});var st='';if(comp&&comp.css)st+=comp.css;if(document.getElementById('layout-grid')&&document.getElementById('layout-grid').checked)st+='.preview-dash .wallet-row{display:grid!important;grid-template-columns:1fr 1fr;gap:4px}';var el=p.querySelector('#cs');if(!el){el=document.createElement('style');el.id='cs';p.appendChild(el)}el.textContent=st}
function resetAll(){cv={};COMPS.forEach(function(c){c.css=''});bv();sc('global');document.getElementById('css-output').value='';document.getElementById('preview').innerHTML='';us()}
async function applyTheme(){try{var css=document.getElementById('css-output').value;await invoke('write_theme_css',{extensionId:'theme-editor',css:css});var s=document.getElementById('stone-theme-css');if(!s){s=document.createElement('style');s.id='stone-theme-css';document.head.appendChild(s)}s.textContent=css;localStorage.setItem('stone-theme','theme-editor');alert('Theme übernommen!')}catch(e){alert('Fehler: '+e)}}
async function saveTheme(){var name=prompt('Theme-Name:','Mein-Theme');if(!name)return;try{var css=document.getElementById('css-output').value;var path=await invoke('save_theme_file',{name:name,css:css});alert('Gespeichert: '+path)}catch(e){var b=new Blob([document.getElementById('css-output').value],{type:'text/css'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name+'.css';a.click()}}
bt();bv();sc('global');uco();
</script></body></html>
